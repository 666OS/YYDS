rules:
  # guard
  - RULE-SET,Tracking,GUARD
  - RULE-SET,Advertising,GUARD
  - AND,((NETWORK,UDP),(DST-PORT,443),(NOT,((GEOIP,CN,no-resolve)))),GUARD
  
  # local
  - RULE-SET,Private,DIRECT
  - RULE-SET,PrivateIP,DIRECT,no-resolve

  # speedtest
  - RULE-SET,Speedtest,SPEEDTEST

  # tm
  - RULE-SET,TM,TM
  - RULE-SET,Telegram,TM
  - RULE-SET,TelegramIP,TM,no-resolve

  # social
  - RULE-SET,SocialMedia,SOCIAL
  - RULE-SET,SocialMediaIP,SOCIAL,no-resolve

  # ai
  - RULE-SET,AI,AI
  - RULE-SET,AIIP,AI,no-resolve

  # dev
  - RULE-SET,Dev,DEV

  # streaming
  - RULE-SET,Emby,EMBY
  - RULE-SET,EmbyIP,EMBY,no-resolve
  - RULE-SET,Streaming,STREAMING
  - RULE-SET,StreamingIP,STREAMING,no-resolve

  #games
  - RULE-SET,Games,GAMES

  # crypto
  - RULE-SET,Crypto,CRYPTO

  # platform
  - RULE-SET,Google,GOOGLE
  - RULE-SET,GoogleIP,GOOGLE,no-resolve
  - RULE-SET,Microsoft,MICROSOFT
  - RULE-SET,Facebook,FACEBOOK
  - RULE-SET,Apple,APPLE

  # outcn
  - RULE-SET,Proxy,OUTCN
  - RULE-SET,ProxyIP,OUTCN,no-resolve

  # cn
  - RULE-SET,China,CN
  - RULE-SET,ChinaIP,CN,no-resolve

  # match
  - MATCH,MATCH

