# Lite_en Edition v2.0.1 by YYDS666 (2026-06-13)
# Repo: https://github.com/666OS/YYDS | Channel: https://t.me/Pinched666
# Add your subscription links in proxy-providers, or insert custom nodes under proxies

# Anchors
x-base-provider: &base-provider {type: http, interval: 86400, proxy: DIRECT, health-check: {enable: true, url: 'https://www.google.com/generate_204', interval: 300}, filter: '^(?!.*(зҫӨ|йӮҖиҜ·|иҝ”еҲ©|еҫӘзҺҜ|е®ҳзҪ‘|е®ўжңҚ|зҪ‘з«ҷ|зҪ‘еқҖ|иҺ·еҸ–|и®ўйҳ…|жөҒйҮҸ|еҲ°жңҹ|жңәеңә|дёӢж¬Ў|зүҲжң¬|е®ҳеқҖ|еӨҮз”Ё|иҝҮжңҹ|е·Із”Ё|иҒ”зі»|йӮ®з®ұ|е·ҘеҚ•|иҙ©еҚ–|йҖҡзҹҘ|еҖ’еҚ–|йҳІжӯў|еӣҪеҶ…|ең°еқҖ|йў‘йҒ“|ж— жі•|иҜҙжҳҺ|дҪҝз”Ё|жҸҗзӨә|зү№еҲ«|и®ҝй—®|ж”ҜжҢҒ|ж•ҷзЁӢ|е…іжіЁ|жӣҙж–°|дҪңиҖ…|еҠ е…Ҙ|USE|USED|TOTAL|EXPIRE|EMAIL|Panel|Channel|Author))'}

x-url-test:        &url-test        { type: url-test, url: "https://www.gstatic.com/generate_204", interval: 300, empty-fallback: REJECT, include-all: true, hidden: true, tolerance: 50 }
x-fallback:        &fallback        { type: fallback, url: "https://www.gstatic.com/generate_204", interval: 300, empty-fallback: REJECT }

x-filter-hk:    &filter-hk    "(?i)жёҜ|hk|hongkong|hong kong"
x-filter-tw:    &filter-tw    "(?i)еҸ°|tw|taiwan|taipei"
x-filter-jp:    &filter-jp    "(?i)ж—Ҙ|jp|japan|tokyo"
x-filter-sg:    &filter-sg    "(?i)ж–°|sg|singapore"
x-filter-kr:    &filter-kr    "(?i)йҹ©|kr|korea|seoul"
x-filter-us:    &filter-us    "(?i)зҫҺ|us|usa|america|united states"

x-oversea:      &oversea      [FALLBACK, MANUAL, HK, TW, JP, SG, KR, US, DIRECT]
x-direct:       &direct       [DIRECT, FALLBACK, MANUAL, HK, TW, JP, SG, KR, US]
x-us-first:     &us-first     [US, FALLBACK, MANUAL, HK, TW, JP, SG, KR]
x-hk-first:     &hk-first     [HK, FALLBACK, MANUAL, TW, JP, SG, KR, US]
x-sg-first:     &sg-first     [SG, FALLBACK, MANUAL, HK, TW, JP, KR, US]
x-jp-first:     &jp-first     [JP, FALLBACK, MANUAL, HK, TW, SG, KR, US]

x-rule-set-domain: &rule-set-domain { type: http, behavior: domain, format: mrs, interval: 86400 }
x-rule-set-ipcidr: &rule-set-ipcidr { type: http, behavior: ipcidr, format: mrs, interval: 86400 }

proxy-providers:
  # Primary: {<<: *base-provider, url: 'YOUR_PRIMARY_URL', override: {additional-prefix: '[P] '}}
  # Backup:   {<<: *base-provider, url: 'YOUR_BACKUP_URL',  override: {additional-prefix: '[B] '}}

# Custom Proxies
proxies:
  # - name: "ss1"
  #   type: ss
  #   server: server
  #   port: 443
  #   cipher: aes-128-gcm
  #   password: password

# General
mode: rule
port: 7890
socks-port: 7891
redir-port: 7892
mixed-port: 7893
tproxy-port: 7895
ipv6: false
allow-lan: false
unified-delay: true
tcp-concurrent: true
log-level: silent
bind-address: '*'
find-process-mode: 'always'
keep-alive-interval: 15
keep-alive-idle: 600
authentication: [mihomo:yyds666]
skip-auth-prefixes: [127.0.0.1/8, '::1/128']
experimental: {quic-go-disable-gso: true}

# Dashboard
external-ui-url: https://github.com/Zephyruso/zashboard/releases/latest/download/dist.zip
external-ui-name: zashboard
external-ui: ui
external-controller: 127.0.0.1:9090
secret: yyds666
profile: {store-selected: true, store-fake-ip: true}

# Sniffer
sniffer:
  enable: true
  sniff:
    HTTP:  {ports: [80, 8080-8880], override-destination: true}
    TLS:   {ports: [443, 8443]}
    QUIC:  {ports: [443, 8443]}
  skip-domain: ["Mijia Cloud", "+.push.apple.com"]

# TUN
tun:
  enable: false
  stack: mixed
  dns-hijack: ["any:53", "tcp://any:53"]
  auto-route: true
  auto-redirect: true
  auto-detect-interface: true

# DNS
dns:
  enable: true
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  default-nameserver: [119.29.29.29, 180.184.1.1, 223.5.5.5]
  nameserver: [https://dns.alidns.com/dns-query, https://doh.pub/dns-query]
  fake-ip-filter: [+.miwifi.com, +.docker.io, +.market.xiaomi.com, +.push.apple.com]

proxy-groups:
  # routing
  - { name: TM,        type: select, proxies: *sg-first, icon: https://github.com/Koolson/Qure/raw/master/IconSet/Color/Telegram_X.png }
  - { name: SOCIAL,    type: select, proxies: *us-first, icon: https://github.com/Koolson/Qure/raw/master/IconSet/Color/Twitter.png }
  - { name: AI,        type: select, proxies: *us-first, icon: https://github.com/Koolson/Qure/raw/master/IconSet/Color/AI.png }
  - { name: DEV,       type: select, proxies: *us-first, icon: https://github.com/Koolson/Qure/raw/master/IconSet/Color/GitHub.png }
  - { name: STREAMING, type: select, proxies: *us-first, icon: https://github.com/Koolson/Qure/raw/master/IconSet/Color/Streaming.png }
  - { name: APPLE,     type: select, proxies: *direct, icon: https://github.com/Koolson/Qure/raw/master/IconSet/Color/Apple_1.png }
  - { name: OUTCN,     type: select, proxies: *oversea, icon: https://github.com/Koolson/Qure/raw/master/IconSet/Color/Global.png }
  - { name: CN,        type: select, proxies: *direct, icon: https://github.com/Koolson/Qure/raw/master/IconSet/Color/China.png }
  - { name: MATCH,     type: select, proxies: *oversea, icon: https://github.com/Koolson/Qure/raw/master/IconSet/Color/Final.png }
  
  # fallback
  - { name: FALLBACK, <<: *fallback, proxies: [US, JP, SG, KR, HK, TW], icon: https://github.com/Koolson/Qure/raw/master/IconSet/Color/ULB.png }

  # manual
  - { name: MANUAL,    type: select, include-all: true, icon: https://github.com/Koolson/Qure/raw/master/IconSet/Color/Clubhouse.png }

  # latency-test
  - { name: HK, <<: *url-test, filter: *filter-hk, icon: https://github.com/Koolson/Qure/raw/master/IconSet/Color/Hong_Kong.png }
  - { name: TW, <<: *url-test, filter: *filter-tw, icon: https://github.com/Koolson/Qure/raw/master/IconSet/Color/Taiwan.png }
  - { name: JP, <<: *url-test, filter: *filter-jp, icon: https://github.com/Koolson/Qure/raw/master/IconSet/Color/Japan.png }
  - { name: SG, <<: *url-test, filter: *filter-sg, icon: https://github.com/Koolson/Qure/raw/master/IconSet/Color/Singapore.png }
  - { name: KR, <<: *url-test, filter: *filter-kr, icon: https://github.com/Koolson/Qure/raw/master/IconSet/Color/Korea.png }
  - { name: US, <<: *url-test, filter: *filter-us, icon: https://github.com/Koolson/Qure/raw/master/IconSet/Color/United_States.png }

rules:
  # guard
  - AND,((NETWORK,UDP),(DST-PORT,443),(NOT,((GEOIP,CN,no-resolve)))),REJECT
  # local
  - RULE-SET,Private,DIRECT
  - RULE-SET,PrivateIP,DIRECT,no-resolve
  # tm
  - RULE-SET,TM,TM
  - RULE-SET,Telegram,TM
  - RULE-SET,TelegramIP,TM,no-resolve
  # social
  - RULE-SET,SocialMedia,SOCIAL
  - RULE-SET,SocialMediaIP,SOCIAL,no-resolve
  # ai
  - RULE-SET,AI,AI
  - RULE-SET,AIIP,AI,no-resolve
  # dev
  - RULE-SET,Dev,DEV
  # streaming
  - RULE-SET,Streaming,STREAMING
  - RULE-SET,StreamingIP,STREAMING,no-resolve
  # platform
  - RULE-SET,Apple,APPLE
  # outcn
  - RULE-SET,Proxy,OUTCN
  - RULE-SET,ProxyIP,OUTCN,no-resolve
  # cn
  - RULE-SET,China,CN
  - RULE-SET,ChinaIP,CN,no-resolve
  # match
  - MATCH,MATCH

