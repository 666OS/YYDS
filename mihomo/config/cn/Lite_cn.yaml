ipv6: false
allow-lan: false
unified-delay: true
tcp-concurrent: true
log-level: silent
bind-address: '*'
find-process-mode: 'always'
keep-alive-interval: 15
keep-alive-idle: 600
authentication: [mihomo:yyds666]
skip-auth-prefixes: [127.0.0.1/8, '::1/128']
experimental: {quic-go-disable-gso: true}

# жҺ§еҲ¶йқўжқҝ
